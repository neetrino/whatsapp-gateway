services:
  gateway:
    build: .
    image: nbos-whatsapp-gateway:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # NODE_ENV from .env (use development for http://localhost cookies)
      - WAHA_BASE_URL=http://waha:3000
      # Do not set WAHA_SESSION_NAME — each WhatsApp account uses its own sessionName (multi-session since WAHA 2026.6.1)
    depends_on:
      - waha
    ports:
      - "3000:3000"

  waha:
    image: devlikeapro/waha:2026.6.2
    restart: unless-stopped
    environment:
      - WAHA_API_KEY=${WAHA_API_KEY}
      - WHATSAPP_DEFAULT_ENGINE=NOWEB
    volumes:
      - waha_sessions:/app/.sessions
    expose:
      - "3000"

volumes:
  waha_sessions:
